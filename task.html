    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .block {
            background-color: hsl(210, 16%, 93%);
            border: 2px solid #f8f8ff
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #252b2c;
            border-radius: 5px;
        }

       
        .task-section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px dashed #ccc;
            background-color: #fafafa;
        }

        .task-title {
            background-color: #385f66;
            color: white;
            padding: 8px 15px;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .full-width-container {
            width: 100%;
            background-color: #d5e8d4;
            border: 2px solid #d0dfe1;
        }

.parent-container {
    border: 3px solid #333;
    background-color: #f0f0f0;
    height: 400px;
    position: relative;
    width: 100%;
}

.half-block {
    width: 50%;
    height: 100%;
    background-color: #c86f8a;
    border: 2px solid #d25b7f;
    box-sizing: border-box;
    display: inline-block;
    margin: 0;
    padding: 10px;
    font-weight: bold;
    color: #9d9b9b;
    vertical-align: top;
}

.top-section {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 33.333%;
    font-size: 0;
    white-space: nowrap;
}

.center-section {
    position: absolute;
    top: 33.333%;
    left: 0;
    width: 100%;
    height: 33.333%;
    font-size: 0;
    white-space: nowrap;
    text-align: center;
}

.bottom-section {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 33.333%;
    font-size: 0;
    white-space: nowrap;
    text-align: right;
}

.top-section .half-block,
.center-section .half-block,
.bottom-section .half-block {
    font-size: 16px;
    height: 100%;
}
.big-gap-container {
    display: flex;
    width: 100%;
    gap: 150px; 
}

.big-gap-container .block {
    flex: 1; 
    margin: 0;
}
        
    </style>
</head>
